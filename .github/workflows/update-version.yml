name: Update Version XML and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  update-xml:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update versions in XML files
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          # Actualizar <version> en manifiestos y XMLs de detalle
          sed -i "s|<version>.*</version>|<version>$VERSION</version>|g" manifest.xml
          sed -i "s|<version>.*</version>|<version>$VERSION</version>|g" mod_formulario_cv.xml
          sed -i "s|<version>.*</version>|<version>$VERSION</version>|g" update_mod.xml
          sed -i "s|<version>.*</version>|<version>$VERSION</version>|g" update_manifest.xml

          # Actualizar atributo version= en update.xml (colector)
          sed -i 's|version="[0-9]*\.[0-9]*\.[0-9]*"|version="'"$VERSION"'"|g' update.xml

          git config user.name github-actions
          git config user.email github-actions@github.com
          git add manifest.xml mod_formulario_cv.xml update.xml update_mod.xml update_manifest.xml
          git commit -m "Actualización automática de versión a $VERSION"
          git push origin main

  build-and-release:
    runs-on: ubuntu-latest
    needs: update-xml
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Crear ZIP del módulo
        run: |
          sleep 5
          zip -r mod_formulario_cv.zip \
            mod_formulario_cv.php \
            mod_formulario_cv.xml \
            manifest.xml \
            helper.php \
            submit.php \
            pdf-calibrator.php \
            index.html \
            tmpl/ \
            media/ \
            language/

      - name: Publicar Release con el ZIP
        uses: softprops/action-gh-release@v1
        with:
          files: mod_formulario_cv.zip
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
