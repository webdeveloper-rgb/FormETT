name: Update Version XML

on:
  push:
    tags:
      - 'v*'

jobs:
  update-xml:
    runs-on: ubuntu-latest
    # IMPORTANTE: Esto otorga los permisos necesarios para escribir en el repo
    permissions:
      contents: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in XML
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          
          # Actualizar el nombre correcto del archivo manifest.xml
          sed -i "s|<version>.*</version>|<version>$VERSION</version>|" manifest.xml
          
          # Actualizar update.xml
          sed -i "s|<version>.*</version>|<version>$VERSION</version>|" update.xml
          
          git config user.name github-actions
          git config user.email github-actions@github.com
          
          # Añadir los archivos correctos (usando manifest.xml en lugar de mod_...)
          git add manifest.xml update.xml
          
          git commit -m "Actualización automática de versión a $VERSION"
          
          # Empujar cambios a la rama main
          git push origin main
